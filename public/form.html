<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>90Shop Admin</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 24px; width: 90%; max-width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h2 { color: #1DB446; margin-bottom: 8px; }
    .profile { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .profile img { width: 44px; height: 44px; border-radius: 50%; }
    .profile span { font-size: 13px; color: #555; }
    label { font-size: 14px; color: #333; display: block; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; background: #1DB446; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:disabled { background: #aaa; }
    #msg { margin-top: 14px; text-align: center; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="title">กำลังโหลด...</h2>
    <div id="owner-fields" style="display:none">
      <label for="lineid-input">LINE ID เจ้าของ (Uxxxxxxxx)</label>
      <input id="lineid-input" type="text" placeholder="Uxxxxxxxx" />
    </div>
    <label id="input-label" for="name-input">ชื่อ</label>
    <input id="name-input" type="text" placeholder="กรอกชื่อ" />
    <button id="submit-btn" disabled>บันทึก</button>
    <div id="msg"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') || 'owner';

    if (mode === 'match') {
      window.location.replace('/match.html');
    }

    async function init() {
      await liff.init({ liffId: '2009523613-hLnRGrZC' });
      if (!liff.isLoggedIn()) { liff.login(); return; }

      if (mode === 'owner') {
        document.getElementById('title').textContent = 'เพิ่ม Owner';
        document.getElementById('input-label').textContent = 'ชื่อ Owner';
        document.getElementById('name-input').placeholder = 'กรอกชื่อ Owner';
        document.getElementById('owner-fields').style.display = 'block';
      } else {
        document.getElementById('title').textContent = 'เพิ่มสาขา';
        document.getElementById('input-label').textContent = 'ชื่อสาขา';
        document.getElementById('name-input').placeholder = 'กรอกชื่อสาขา';
      }

      document.getElementById('submit-btn').disabled = false;
    }

    document.getElementById('submit-btn').addEventListener('click', async () => {
      const name = document.getElementById('name-input').value.trim();
      if (!name) { document.getElementById('msg').textContent = 'กรุณากรอกชื่อ'; return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';

      let endpoint, body;
      if (mode === 'owner') {
        const userId = document.getElementById('lineid-input').value.trim();
        if (!userId) { document.getElementById('msg').textContent = 'กรุณากรอก LINE ID'; btn.disabled = false; btn.textContent = 'บันทึก'; return; }
        endpoint = '/api/add-owner';
        body = { userId, name };
      } else {
        endpoint = '/api/add-branch';
        body = { name };
      }

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        document.getElementById('msg').textContent = data.message || 'บันทึกสำเร็จ';
        setTimeout(() => liff.closeWindow(), 1500);
      } catch (e) {
        document.getElementById('msg').textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        btn.disabled = false;
        btn.textContent = 'บันทึก';
      }
    });

    init();
  </script>
</body>
</html>
